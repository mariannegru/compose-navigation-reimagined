jdk:
  - openjdk17

# JitPack runs `./gradlew install` by default, which doesn't exist here because
# publishing is configured through the `maven-publish` plugin inside
# `buildSrc/src/main/kotlin/publishing-config.gradle.kts`.
# Publish only the artifacts consumers will depend on (skip samples/test-utils).
# Signing is skipped automatically via the `isMavenLocalPublish` guard in
# publishing-config.gradle.kts — JitPack has no PGP key, so the sign* tasks
# are never registered and don't need to be excluded.
install:
  - ./gradlew
      :reimagined:publishToMavenLocal
      :reimagined-material-common:publishToMavenLocal
      :reimagined-material:publishToMavenLocal
      :reimagined-material3:publishToMavenLocal
      :reimagined-hilt:publishToMavenLocal
